spring.application.name=Admin-Service
server.port=9098

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/admin_db
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=fooddelivery_secret_key_min_32_chars_long
jwt.expiration=86400000

auth.service.url=http://localhost:9092
restaurant.service.url=http://localhost:9093
order.service.url=http://localhost:9094
delivery.service.url=http://localhost:9095
# Eureka
eureka.client.service-url.defaultZone=http://localhost:9090/eureka/
eureka.instance.prefer-ip-address=true
