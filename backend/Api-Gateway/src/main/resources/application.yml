server:
  port: 9091

spring:
  application:
    name: Api-Gateway

  cloud:
    gateway:
      routes:
        # Auth Service Route
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        # Restaurant Service Route
        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/restaurants/**,/api/menu/**

        # Order Service Route
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

        # Delivery Service Route
        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/delivery/**

        # Payment Service Route
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**

        # AI Service Route
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**

# Eureka Config
eureka:
  client:
    service-url:
      defaultZone: http://localhost:9090/eureka/
  instance:
    prefer-ip-address: true

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG